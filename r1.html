<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Brasil - Distribuidora</title>
    <link rel="icon" type="image/jpg" href="favicon.jpg">

    <style>
        :root {
            --bg-header: linear-gradient(135deg, #0b1120 0%, #151d2f 100%);
            --accent-top: linear-gradient(90deg, #38bdf8, #818cf8, #e94560);
            --icon-bg: rgba(56, 189, 248, 0.12);
            --icon-border: rgba(56, 189, 248, 0.35);
            --icon-stroke: #38bdf8;
            --badge-bg: rgba(148, 163, 184, 0.2);
            --badge-border: rgba(148, 163, 184, 0.3);
            --text-secondary: #94a3b8;
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.15);
            --gray: #e2e8f0;
            --gray-text: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background-color: #f8fafc;
            min-height: 100vh;
        }

        /* ===== CABEÇALHO ===== */
        .header {
            position: relative;
            background: var(--bg-header);
            padding: 12px 16px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
            width: 100%;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--accent-top);
        }

        .icon-wrap {
            width: 50px; height: 50px;
            background: var(--icon-bg);
            border: 1.5px solid var(--icon-border);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .icon-wrap svg {
            width: 28px; height: 28px;
            stroke: var(--icon-stroke);
            fill: none;
            stroke-width: 1.6;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .brand { 
            display: flex; flex-direction: column; flex: 1; min-width: 0;
        }

        .brand h1 {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            line-height: 1.2;
            color: #ffffff;
        }

        .meta-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }

        .tag {
            font-size: 0.62rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 3px 10px;
            border-radius: 5px;
            background: var(--badge-bg);
            color: #e2e8f0;
            border: 1px solid var(--badge-border);
        }

        .divider { color: #64748b; font-size: 0.6rem; }

        .meta-text {
            font-size: 0.72rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* ===== CONTAINER PRINCIPAL ===== */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        /* ===== CARD DO PRODUTO ===== */
        .product-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .product-header {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .product-image {
            width: 90px;
            height: 90px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--gray);
            flex-shrink: 0;
        }

        .product-info {
            flex: 1;
            min-width: 0;
        }

        .product-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .product-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 8px;
        }

        .meta-item {
            font-size: 0.8rem;
            color: var(--gray-text);
        }

        .meta-item strong {
            color: #475569;
            font-weight: 600;
        }

        .product-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--success);
        }

        /* ===== NÚMERO DO PEDIDO (FIXO, ESQUERDA) ===== */
        .order-section {
            margin-bottom: 20px;
            text-align: left;
        }

        .order-label {
            font-size: 0.7rem;
            color: var(--gray-text);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .order-number {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--success);
            letter-spacing: 0.5px;
        }

        /* ===== INFORMAÇÕES DE ENTREGA ===== */
        .delivery-info {
            background: #ffffff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .delivery-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-text);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .recipient-name {
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 10px;
        }

        .address {
            font-size: 0.85rem;
            color: #475569;
            line-height: 1.5;
        }

        .address-line {
            margin-bottom: 3px;
        }

        /* ===== TIMELINE DE STATUS ===== */
        .timeline {
            background: #ffffff;
            border-radius: 12px;
            padding: 20px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .timeline-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-text);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .timeline-item {
            display: flex;
            gap: 14px;
            margin-bottom: 20px;
            position: relative;
        }

        .timeline-item:last-child {
            margin-bottom: 0;
        }

        .timeline-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }

        .timeline-icon svg {
            width: 18px;
            height: 18px;
        }

        .timeline-line {
            position: absolute;
            left: 20px;
            top: 40px;
            width: 2px;
            height: calc(100% - 20px);
            background: var(--gray);
            z-index: 1;
        }

        .timeline-item:last-child .timeline-line {
            display: none;
        }

        .timeline-content {
            flex: 1;
            padding-top: 8px;
        }

        .timeline-title-text {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .timeline-desc {
            font-size: 0.8rem;
            color: var(--gray-text);
            margin-bottom: 2px;
        }

        .timeline-date {
            font-size: 0.75rem;
            color: var(--gray-text);
        }

        /* STATUS ATIVO (VERDE) */
        .timeline-item.active .timeline-icon {
            background: var(--success-bg);
            color: var(--success);
        }

        .timeline-item.active .timeline-icon svg {
            stroke: var(--success);
            fill: none;
        }

        .timeline-item.active .timeline-title-text {
            color: var(--success);
        }

        .timeline-item.active .timeline-line {
            background: var(--success);
        }

        /* STATUS INATIVO (CINZA) */
        .timeline-item.inactive .timeline-icon {
            background: var(--gray);
            color: var(--gray-text);
        }

        .timeline-item.inactive .timeline-icon svg {
            stroke: var(--gray-text);
            fill: none;
        }

        .timeline-item.inactive .timeline-title-text,
        .timeline-item.inactive .timeline-desc,
        .timeline-item.inactive .timeline-date {
            color: var(--gray-text);
        }

        /* ===== RESPONSIVIDADE ===== */
        @media (max-width: 480px) {
            .header { padding: 12px 14px; gap: 12px; }
            .icon-wrap { width: 46px; height: 46px; }
            .icon-wrap svg { width: 26px; height: 26px; }
            .brand h1 { font-size: 1.05rem; }
            .meta-text { font-size: 0.68rem; }
            
            .container { padding: 16px 12px; }
            
            .product-card { padding: 14px; }
            .product-header { gap: 12px; }
            .product-image { width: 80px; height: 80px; }
            .product-name { font-size: 0.9rem; }
            .product-value { font-size: 1.15rem; }
            
            .order-number { font-size: 1.2rem; }
            
            .delivery-info { padding: 14px; }
            .timeline { padding: 18px 14px; }
            .timeline-item { gap: 12px; }
            .timeline-icon { width: 38px; height: 38px; }
            .timeline-line { left: 19px; }
        }

        @media (max-width: 360px) {
            .header { padding: 10px 12px; gap: 10px; }
            .brand h1 { font-size: 0.95rem; }
            .icon-wrap { width: 42px; height: 42px; }
            .icon-wrap svg { width: 24px; height: 24px; }
            
            .product-image { width: 70px; height: 70px; }
            .product-name { font-size: 0.85rem; }
            .product-value { font-size: 1.1rem; }
            .order-number { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <!-- CABEÇALHO -->
    <header class="header">
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M1 10h10a1 1 0 0 1 1 1v5a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V11a1 1 0 0 1 1-1z" fill="none"/>
                <line x1="3" y1="14" x2="9" y2="14" stroke-width="1"/>
                <line x1="5.5" y1="11" x2="5.5" y2="17" stroke-width="0.8"/>
                <path d="M12 13h5a1 1 0 0 1 0.8 0.4L20.5 17a1 1 0 0 1-0.8 0.6H12V13z" fill="none"/>
                <path d="M13 14h3.5l1.2 1.8H13V14z" fill="rgba(56,189,248,0.15)"/>
                <circle cx="19.5" cy="16.5" r="0.7" fill="#38bdf8" stroke="none"/>
                <line x1="12" y1="18.5" x2="21" y2="18.5" stroke-width="1.5"/>
                <circle cx="4" cy="18.5" r="1.6" fill="none"/>
                <circle cx="4" cy="18.5" r="0.6" fill="#38bdf8" stroke="none"/>
                <circle cx="18" cy="18.5" r="1.6" fill="none"/>
                <circle cx="18" cy="18.5" r="0.6" fill="#38bdf8" stroke="none"/>
                <line x1="5.6" y1="18.5" x2="16.4" y2="18.5" stroke-width="0.6"/>
                <path d="M1 7h1" stroke-width="1" opacity="0.4"/>
                <path d="M4 7h1" stroke-width="1" opacity="0.4"/>
                <path d="M7 7h1" stroke-width="1" opacity="0.4"/>
                <path d="M10 7h1" stroke-width="1" opacity="0.4"/>
                <path d="M13 7h1" stroke-width="1" opacity="0.4"/>
                <path d="M16 7h1" stroke-width="1" opacity="0.4"/>
                <path d="M19 7h1" stroke-width="1" opacity="0.4"/>
                <path d="M22 7h1" stroke-width="1" opacity="0.4"/>
                <path d="M21.5 5.5L22.5 6.5L21.5 7.5" stroke-width="1.2"/>
            </svg>
        </div>
        <div class="brand">
            <h1>Central Brasil</h1>
            <div class="meta-row">
                <span class="tag">Distribuidora</span>
                <span class="divider">•</span>
                <span class="meta-text">CNPJ: 50.742.088/0001-95</span>
                <span class="divider">•</span>
                <span class="meta-text">Todo Brasil</span>
            </div>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="container">
        <!-- CARD DO PRODUTO -->
        <div class="product-card">
            <div class="product-header">
                <img id="productImage" src="" alt="Produto" class="product-image">
                <div class="product-info">
                    <h2 id="productName" class="product-name"></h2>
                    <div class="product-meta">
                        <span class="meta-item"><strong>Qtd:</strong> <span id="productQty"></span></span>
                        <span class="meta-item"><strong>Prazo:</strong> <span id="deliveryDeadline"></span></span>
                    </div>
                    <div id="productValue" class="product-value"></div>
                </div>
            </div>
        </div>

        <!-- NÚMERO DO PEDIDO (FIXO, ESQUERDA) -->
        <div class="order-section">
            <div class="order-label">Número do Pedido</div>
            <div class="order-number">#BR7TY6FW76</div>
        </div>

        <!-- INFORMAÇÕES DE ENTREGA -->
        <div class="delivery-info">
            <div class="delivery-title">Endereço de Entrega</div>
            <div id="recipientName" class="recipient-name"></div>
            <div id="addressFull" class="address"></div>
        </div>

        <!-- TIMELINE DE STATUS -->
        <div class="timeline">
            <div class="timeline-title">Status do Pedido</div>
            
            <!-- Status 1: Aguardando pagamento -->
            <div class="timeline-item" id="status1">
                <div class="timeline-line"></div>
                <div class="timeline-icon">
                    <!-- Ícone: Relógio / Documento pendente -->
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="9" stroke-width="2" fill="none"/>
                        <path d="M12 7v5l3 3" stroke-width="2" fill="none" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="timeline-content">
                    <div class="timeline-title-text">Aguardando pagamento</div>
                    <div class="timeline-desc">Recebemos seu pedido</div>
                    <div class="timeline-date" id="approvalDate"></div>
                </div>
            </div>

            <!-- Status 2: Pagamento confirmado -->
            <div class="timeline-item" id="status2">
                <div class="timeline-line"></div>
                <div class="timeline-icon">
                    <!-- Ícone: Cartão / Check de pagamento -->
                    <svg viewBox="0 0 24 24">
                        <rect x="2" y="5" width="20" height="14" rx="2" stroke-width="2" fill="none"/>
                        <line x1="2" y1="10" x2="22" y2="10" stroke-width="2"/>
                        <path d="M9 16.5l2 2 4-4" stroke-width="2" fill="none" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="timeline-content">
                    <div class="timeline-title-text">Pagamento confirmado</div>
                    <div class="timeline-desc">Aguardando envio</div>
                </div>
            </div>

            <!-- Status 3: Pedido enviado -->
            <div class="timeline-item" id="status3">
                <div class="timeline-line"></div>
                <div class="timeline-icon">
                    <!-- Ícone: Caminhão de entrega original -->
                    <svg viewBox="0 0 24 24">
                        <rect x="1" y="6" width="13" height="9" rx="1.5" stroke-width="2" fill="none"/>
                        <path d="M14 10h4a1 1 0 0 1 1 1v4a1 1 0 0 1-1 1h-4V10z" stroke-width="2" fill="none"/>
                        <circle cx="5.5" cy="17.5" r="1.8" stroke-width="2" fill="none"/>
                        <circle cx="17.5" cy="17.5" r="1.8" stroke-width="2" fill="none"/>
                    </svg>
                </div>
                <div class="timeline-content">
                    <div class="timeline-title-text">Pedido enviado</div>
                    <div class="timeline-desc">Em transporte</div>
                </div>
            </div>

            <!-- Status 4: Previsão de entrega -->
            <div class="timeline-item" id="status4">
                <div class="timeline-icon">
                    <!-- Ícone: Localização / Check de entrega -->
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke-width="2" fill="none"/>
                        <circle cx="12" cy="9" r="3" stroke-width="2" fill="none"/>
                        <path d="M9 16.5l2 2 4-4" stroke-width="2" fill="none" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="timeline-content">
                    <div class="timeline-title-text">Previsão de entrega</div>
                    <div class="timeline-date" id="deliveryDate"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Função para pegar parâmetros da URL
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }

        // Função para formatar data (apenas DD/MM/AAAA)
        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

        // Função para formatar valor
        function formatValue(value) {
            if (!value) return 'R$ 0,00';
            const numValue = parseFloat(value);
            return 'R$ ' + numValue.toFixed(2).replace('.', ',');
        }

        // Atualizar status da timeline
        function updateStatus(statusLevel) {
            const level = parseInt(statusLevel) || 1;
            
            for (let i = 1; i <= 4; i++) {
                const statusItem = document.getElementById(`status${i}`);
                if (i <= level) {
                    statusItem.classList.remove('inactive');
                    statusItem.classList.add('active');
                } else {
                    statusItem.classList.remove('active');
                    statusItem.classList.add('inactive');
                }
            }
        }

        // Preencher dados na página
        function populateData() {
            // Produto
            const img = getUrlParameter('img');
            const nome = getUrlParameter('nome');
            const valor = getUrlParameter('valor');
            const quantidade = getUrlParameter('quantidade');
            const prazoInicio = getUrlParameter('prazo_inicio');
            const prazoFim = getUrlParameter('prazo_fim');
            
            // Entrega
            const nomeDestinatario = getUrlParameter('nome_destinatario');
            const endereco = getUrlParameter('endereco');
            const cep = getUrlParameter('cep');
            
            // Datas via URL
            const dataAprovacao = getUrlParameter('data_aprovacao');
            const dataEntrega = getUrlParameter('data_entrega');
            
            // Status
            const status = getUrlParameter('status');

            // Preencher produto
            document.getElementById('productImage').src = img || 'https://via.placeholder.com/90x90?text=Produto';
            document.getElementById('productName').textContent = nome || 'Produto não informado';
            document.getElementById('productQty').textContent = quantidade || '1';
            document.getElementById('deliveryDeadline').textContent = 
                `${prazoInicio || '00'} e ${prazoFim || '00'}`;
            document.getElementById('productValue').textContent = formatValue(valor);

            // Preencher entrega
            document.getElementById('recipientName').textContent = nomeDestinatario || 'Destinatário não informado';
            
            const addressHTML = endereco ? 
                `<div class="address-line">${endereco}</div>` + 
                (cep ? `<div class="address-line">CEP: ${cep}</div>` : '') : 
                'Endereço não informado';
            document.getElementById('addressFull').innerHTML = addressHTML;

            // Preencher DATAS via parâmetros de URL
            if (dataAprovacao) {
                document.getElementById('approvalDate').textContent = 
                    `Aprovado em ${formatDate(dataAprovacao)}`;
            }
            
            if (dataEntrega) {
                document.getElementById('deliveryDate').textContent = 
                    `Entrega prevista para ${formatDate(dataEntrega)}`;
            }

            // Atualizar status da timeline
            updateStatus(status);
        }

        // Executar quando a página carregar
        window.addEventListener('DOMContentLoaded', populateData);
    </script>
</body>
</html>
