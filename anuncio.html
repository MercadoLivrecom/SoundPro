<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando...</title>
    
    <!-- Método 1: Meta Refresh (funciona mesmo sem JavaScript) -->
    <meta http-equiv="refresh" content="0;url=https://atacadoconnect.com/camera-da-ponte-da-amizade-ao-vivo">
    
    <!-- Método 2: JavaScript (redirecionamento instantâneo) -->
    <script type="text/javascript">
        // Redireciona imediatamente
        window.location.href = "https://atacadoconnect.com/camera-da-ponte-da-amizade-ao-vivo";
        
        // Fallback caso o JS acima não funcione
        setTimeout(function() {
            window.location.replace("https://atacadoconnect.com/camera-da-ponte-da-amizade-ao-vivo");
        }, 100);
    </script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            text-align: center;
        }
        .container {
            padding: 2rem;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #00d4aa;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #00d4aa;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <p>Redirecionando para a câmera da Ponte da Amizade...</p>
        <p style="font-size: 0.9rem; opacity: 0.8;">
            Se não for redirecionado automaticamente, 
            <a href="https://atacadoconnect.com/camera-da-ponte-da-amizade-ao-vivo" target="_blank">clique aqui</a>.
        </p>
    </div>
</body>
</html>
